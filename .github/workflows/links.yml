name: Link check

on:
  pull_request:
  schedule:
    - cron: "17 2 * * 1"

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check markdown links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --verbose
            --no-progress
            --base https://docs.vaner.ai
            --exclude http://localhost:3000
            --exclude https://github.com/Borgels/Vaner/security/policy
            --exclude https://github.com/Borgels/Vaner/tree/main/examples
            --exclude https://docs.vaner.ai/integrations/tools/claude-code-mcp
            --exclude https://docs.vaner.ai/integrations/connect-your-client
            --exclude https://docs.vaner.ai/supported-hardware
            --exclude https://docs.vaner.ai/scenarios
            --exclude https://docs.vaner.ai/troubleshooting
            --exclude '^https://docs\.vaner\.ai/simple-mode($|#)'
            --exclude '^https://docs\.vaner\.ai/advanced-mode($|#)'
            --exclude '^https://docs\.vaner\.ai/policy-bundles($|#)'
            --exclude '^https://docs\.vaner\.ai/hardware-tiers($|#)'
            --exclude '^https://docs\.vaner\.ai/deep-run($|#)'
            --exclude '^https://docs\.vaner\.ai/prepared-work($|#)'
            --exclude '^https://docs\.vaner\.ai/human-product-proof($|#)'
            --exclude https://docs.vaner.ai/integrations/integration-layer
            "./**/*.md"
            "./**/*.mdx"
